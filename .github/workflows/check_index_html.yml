name: Check index.html present or not

on:
  workflow_dispatch:

jobs:
  check-file:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Run index.html check script
      run: |
        chmod +x ./check_index.sh
        ./check_index.sh
