name: Check index.html and update main README

on:
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Run index.html check script
      id: check_index
      run: |
        chmod +x ./check_index.sh
        ./check_index.sh

    - name: Configure Git user
      if: steps.check_index.outcome == 'success'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Update README.md in main branch
      if: steps.check_index.outcome == 'success'
      run: |
        BRANCH_NAME=$(echo "${GITHUB_REF#refs/heads/}")
        git fetch origin main
        git checkout main
        echo "- Branch **$BRANCH_NAME**: index.html file present: ✅" >> README.md
        git add README.md
        git commit -m "Update README.md: add info about $BRANCH_NAME branch with index.html"
        git push origin main
